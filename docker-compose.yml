services:
  mysql:
    image: mysql:8.4
    container_name: marca-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-marca}
      MYSQL_USER: ${MYSQL_USER:-marca}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-marca-dev}
      TZ: Asia/Shanghai
    ports:
      # 主机端口 3307 映射到容器 3306，避免与服务器上其他 MySQL 冲突
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - marca-mysql-data:/var/lib/mysql
      # 首次启动时自动按文件名顺序执行
      - ./marca-backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./marca-backend/src/main/resources/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  marca-mysql-data:
    name: marca-mysql-data
